ai_tools_used:
  - "Gemini"
  - "Google Antigravity IDE"

ai_usage_summary: |
  Used Gemini for architecture discussions ,Project architecture and Challenge Explaining, and Google Antigravity IDE for basic code completion, and assisting with writing the deterministic honeypot detection rules. The core ranking pipeline and behavioral signal integrations were build with help of AI and my Skills in Machine Learning and Data Science, but no candidate data was ever sent to external LLMs; all embeddings and scoring were executed locally.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-stage hybrid architecture:
  1. Offline CPU Precomputation: Converts all 100K profiles into structured text and embeds them into 384-dimensional dense vectors using a local HuggingFace all-MiniLM-L6-v2 model.
  2. Runtime CPU Ranking: A composite scoring engine blending 7 factors: Semantic Cosine Similarity (35%), Role Relevance (20%), Experience Gaussian Fit (15%), Redrob Behavioral Signals (15%), Core AI Skills (5%), Consulting Penalty (5%), and Career Stability (5%).
  We also wrote 3 deterministic rules that successfully caught and filtered out 65 honeypots (impossible dates, 0-duration expert skills).
  Runtime is ~66 seconds for 100K candidates on CPU.

